<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online Test</title>
    <meta name="google" content="notranslate" /> <!-- Default holatda butun sahifani bloklamaymiz, klasslar orqali boshqaramiz -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Tungi rejim */
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
            --hover-opt: #334155;
        }

        [data-theme="light"] {
            /* Kunduzgi rejim */
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --success: #16a34a;
            --error: #dc2626;
            --hover-opt: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            top: 0 !important; 
            position: static !important;
        }

        /* --- Google Translate Moslashuv --- */
        .goog-te-banner-frame { display: none !important; }
        .goog-tooltip { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
        
        /* Select qutisini chiroyli qilish */
        .goog-te-combo {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 5px;
            outline: none;
            font-size: 0.9rem;
        }

        /* Sozlamalar Paneli */
        .settings-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 1000;
            background: var(--container-bg);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .icon-btn:hover { background: var(--hover-opt); color: var(--accent); }

        .container {
            width: 100%;
            max-width: 850px;
            background-color: var(--container-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            position: relative;
            border: 1px solid var(--border);
        }

        h1, h2, h3 { text-align: center; color: var(--accent); margin-bottom: 25px; }

        /* Form Elementlari */
        input, select {
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px;
            border: 2px solid var(--border); background: var(--bg-color); color: var(--text-main);
            font-size: 1rem; outline: none;
        }
        input:focus { border-color: var(--accent); }
        label { margin-bottom: 8px; display: block; color: var(--text-muted); font-weight: 500; }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: var(--accent); color: white; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; letter-spacing: 0.5px;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-outline:hover { background: var(--accent); color: white; }

        /* --- Test Ekrani & Sakrashni oldini olish --- */
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;
        }
        
        /* Soat sakramasligi uchun qat'iy stil */
        .timer-badge {
            background: rgba(59, 130, 246, 0.15); color: var(--accent);
            padding: 5px 0; border-radius: 20px; font-family: 'Courier New', monospace;
            font-size: 1.3rem; font-weight: bold; min-width: 90px; text-align: center;
            display: inline-block;
        }

        .theme-tag {
            display: inline-block; background: var(--border); color: var(--text-muted);
            padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 10px;
        }

        .question-text { font-size: 1.25rem; line-height: 1.6; margin-bottom: 25px; font-weight: 500; }
        .question-text br { display: block; margin-bottom: 8px; content: ""; }

        .options-list { display: grid; gap: 12px; }
        .option-item {
            background: var(--bg-color); border: 2px solid var(--border);
            padding: 15px 20px; border-radius: 12px; cursor: pointer;
            display: flex; gap: 15px; align-items: center; font-size: 1rem;
        }
        .option-item:hover { border-color: var(--accent); background: var(--hover-opt); }
        /* Variant harflari tarjima qilinmaydi */
        .option-key { 
            background: var(--border); width: 30px; height: 30px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; font-weight: bold; font-size: 0.9rem; flex-shrink: 0;
        }

        /* Natijalar */
        .result-circle {
            width: 180px; height: 180px; border-radius: 50%; margin: 0 auto 30px;
            border: 10px solid var(--border); display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 3rem; font-weight: bold;
        }
        
        .review-box { margin-top: 30px; max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .review-box::-webkit-scrollbar { width: 8px; }
        .review-box::-webkit-scrollbar-track { background: var(--bg-color); }
        .review-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .review-card {
            background: var(--bg-color); padding: 15px; border-radius: 10px;
            margin-bottom: 15px; border-left: 5px solid var(--border);
        }
        .review-card.correct { border-left-color: var(--success); }
        .review-card.wrong { border-left-color: var(--error); }
        
        .ans-row { margin-top: 8px; font-size: 0.95rem; }
        .ans-label { font-weight: bold; margin-right: 5px; }

        /* Yuklash */
        .loader { border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .fallback-box { text-align: center; margin-top: 20px; padding: 20px; border: 2px dashed var(--border); border-radius: 10px; background: rgba(0,0,0,0.1); }
        .file-input-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: var(--border); color: var(--text-main); border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Sozlamalar -->
    <div class="settings-panel">
        <!-- Tarjimon -->
        <div id="google_translate_element"></div>
        
        <!-- Tun/Kun -->
        <button class="icon-btn" onclick="toggleTheme()" title="Rejim">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </div>

    <div class="container">
        
        <!-- 1. Yuklanish ekrani -->
        <div id="loading-screen">
            <div class="loader"></div>
            <p id="loading-text" style="text-align: center; margin-top: 10px;">Loading Database...</p>
            
            <div id="fallback-option" class="hidden fallback-box">
                <p style="color: var(--error); font-weight: bold; margin-bottom: 10px;">
                    <i class="fas fa-wifi"></i> No connection or slow network.
                </p>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">
                    Please select <b>testbase.json</b> manually:
                </p>
                <label for="localFile" class="file-input-btn">
                    <i class="fas fa-folder-open"></i> Select File
                </label>
                <input type="file" id="localFile" accept=".json" style="display: none;" onchange="loadLocalFile(this)">
            </div>
        </div>

        <!-- 2. Kirish ekrani -->
        <div id="start-screen" class="hidden">
            <h1><i class="fas fa-university"></i> Online Test Platform</h1>
            <p style="text-align: center; margin-bottom: 30px; color: var(--text-muted);">
                Status: <span style="color: var(--success); font-weight: bold;">Online (<span id="total-q" class="notranslate">0</span> questions)</span>
            </p>

            <label>Full Name:</label>
            <input type="text" id="username" placeholder="Enter your name" required>

            <label>Question Count:</label>
            <input type="number" id="q-count" value="20" min="1">

            <button class="btn" onclick="startQuiz()">START QUIZ</button>
        </div>

        <!-- 3. Test Jarayoni -->
        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <div><i class="fas fa-user-graduate"></i> <span id="display-name" class="notranslate">User</span></div>
                <!-- notranslate = soatni tarjimon buzmaydi -->
                <div class="timer-badge notranslate" id="timer">00:00</div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div class="theme-tag" id="q-theme">General</div>
                <div style="font-size: 0.9rem; color: var(--text-muted);">
                    № <span id="q-idx" class="notranslate">1</span>/<span id="q-total" class="notranslate">20</span>
                </div>
            </div>

            <!-- Translate qilinadigan qismlar -->
            <div class="question-text" id="q-text">Loading...</div>
            <div class="options-list" id="options-area"></div>
        </div>

        <!-- 4. Natijalar -->
        <div id="result-screen" class="hidden">
            <h2>Results</h2>
            
            <div class="result-circle" id="score-circle">
                <span id="score-percent" class="notranslate">0%</span>
                <span style="font-size: 1rem; color: var(--text-muted); margin-top: -10px;">score</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <button class="btn" onclick="downloadJSON()"><i class="fas fa-file-download"></i> Save Result</button>
                <button class="btn btn-outline" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Restart</button>
            </div>

            <h3 style="border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 30px;">
                <i class="fas fa-clipboard-check"></i> Analysis
            </h3>
            <div class="review-box" id="review-area"></div>
        </div>

    </div>

    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,ru,uz',
                layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL, 
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const DB_URL = "https://raw.githubusercontent.com/sunattagayev-cloud/Testlar/refs/heads/main/testbase.json";
        
        let allQuestions = [];
        let quizSet = [];
        let currentIdx = 0;
        let timerInterval;
        let timeLeft = 0;
        let userData = { name: '', count: 0 };
        let userResponses = []; 
        let questionStartTime = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const fallbackTimeout = setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (!loadingScreen.classList.contains('hidden')) {
                    document.getElementById('fallback-option').classList.remove('hidden');
                    document.getElementById('loading-text').innerHTML = "Server is slow...";
                }
            }, 4000);

            fetch(DB_URL)
                .then(res => {
                    if (!res.ok) throw new Error("Error");
                    return res.text();
                })
                .then(text => {
                    clearTimeout(fallbackTimeout);
                    try {
                        allQuestions = JSON.parse(text);
                        initQuiz();
                    } catch (e) { throw new Error("JSON Parse Error"); }
                })
                .catch(err => console.log("Manual upload required"));
        });

        function loadLocalFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    allQuestions = JSON.parse(e.target.result);
                    initQuiz();
                } catch (error) { alert("Invalid File"); }
            };
            reader.readAsText(file);
        }

        function initQuiz() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('total-q').textContent = allQuestions.length;
        }

        function formatOptionText(text) {
            if (!text) return text;
            const num = parseFloat(text);
            if (!isNaN(text) && !isNaN(num) && num > 0 && num <= 1 && text.toString().length < 6) {
                return (num * 100) + "%";
            }
            return text;
        }

        function startQuiz() {
            const name = document.getElementById('username').value.trim();
            const countInp = document.getElementById('q-count');
            let count = parseInt(countInp.value);

            if (!name) return alert("Enter Name!");
            if (isNaN(count) || count < 1) count = 20;
            if (count > allQuestions.length) count = allQuestions.length;

            userData.name = name;
            userData.count = count;
            quizSet = allQuestions.sort(() => 0.5 - Math.random()).slice(0, count);
            timeLeft = count * 120; 

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('display-name').textContent = name;
            document.getElementById('q-total').textContent = count;

            startTimer();
            loadQuestion(0);
        }

        // ==========================================
        // TARJIMONNI YANGILASH FUNKSIYASI (HACK)
        // ==========================================
        function refreshTranslation() {
            // Google Translate select elementini topamiz
            const combo = document.querySelector('.goog-te-combo');
            if (combo && combo.value) {
                // Agar til tanlangan bo'lsa (masalan 'uz'), uni eslab qolamiz
                const currentLang = combo.value;
                if (currentLang !== 'en') {
                    // 1. Tarjimani o'chiramiz (inglizga qaytaramiz) - lekin foydalanuvchiga bildirmasdan
                    combo.value = 'en'; 
                    combo.dispatchEvent(new Event('change'));

                    // 2. Juda qisqa vaqtdan keyin yana o'sha tilga qaytaramiz
                    // Bu Google-ni "yangi matn keldi, qayta tarjima qil" deb o'ylashga majbur qiladi
                    setTimeout(() => {
                        combo.value = currentLang;
                        combo.dispatchEvent(new Event('change'));
                    }, 50); // 50 millisekund (juda tez)
                }
            }
        }

        function loadQuestion(index) {
            currentIdx = index;
            const q = quizSet[index];
            
            document.getElementById('q-idx').textContent = index + 1;
            document.getElementById('q-theme').textContent = q.Theme || "General";

            // Formatlash
            let text = q.Question;
            text = text.replace(/(\b[i|v|x]+\.)\s/gi, '<br><b class="notranslate">$1</b> '); 
            text = text.replace(/\n/g, '<br>');
            document.getElementById('q-text').innerHTML = text;

            const area = document.getElementById('options-area');
            area.innerHTML = '';
            
            const options = [
                { k: 'A', t: q.A },
                { k: 'B', t: q.B },
                { k: 'C', t: q.C },
                { k: 'D', t: q.D }
            ].filter(o => o.t);

            questionStartTime = Date.now();

            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option-item';
                const displayText = formatOptionText(opt.t);
                
                div.innerHTML = `<span class="option-key notranslate">${opt.k}</span> ${displayText}`;
                div.onclick = () => answerSelected(opt.t, q);
                area.appendChild(div);
            });

            // MUHIM: Savol yuklangandan keyin tarjimonni yangilaymiz
            setTimeout(refreshTranslation, 100);
        }

        function answerSelected(choosenText, qObj) {
            const timeSpent = ((Date.now() - questionStartTime) / 1000).toFixed(1);
            const correctText = String(qObj["True answer"]).trim();
            const selectedStr = String(choosenText).trim();
            const isCorrect = selectedStr === correctText;

            userResponses.push({
                question_id: qObj.Question_ID,
                theme: qObj.Theme,
                question: qObj.Question,
                selectedOriginal: selectedStr,
                correctOriginal: correctText,
                is_correct: isCorrect,
                time_spent_seconds: timeSpent
            });

            if (currentIdx + 1 < userData.count) {
                loadQuestion(currentIdx + 1);
            } else {
                finishQuiz();
            }
        }

        function startTimer() {
            const el = document.getElementById('timer');
            timerInterval = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                el.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishQuiz();
                } else {
                    timeLeft--;
                }
            }, 1000);
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const correctCount = userResponses.filter(r => r.is_correct).length;
            const percentage = Math.round((correctCount / userData.count) * 100);

            const circle = document.getElementById('score-circle');
            document.getElementById('score-percent').textContent = percentage + "%";
            
            if(percentage >= 80) { circle.style.borderColor = "var(--success)"; circle.style.color = "var(--success)"; }
            else if(percentage >= 50) { circle.style.borderColor = "#f59e0b"; circle.style.color = "#f59e0b"; } 
            else { circle.style.borderColor = "var(--error)"; circle.style.color = "var(--error)"; }

            const reviewArea = document.getElementById('review-area');
            reviewArea.innerHTML = '';

            userResponses.forEach((res, index) => {
                const card = document.createElement('div');
                card.className = `review-card ${res.is_correct ? 'correct' : 'wrong'}`;
                
                const selectedDisplay = formatOptionText(res.selectedOriginal);
                const correctDisplay = formatOptionText(res.correctOriginal);

                let content = `
                    <div style="display:flex; justify-content:space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom:5px;">
                        <span>#${index+1} <span class="notranslate">(${res.question_id})</span></span>
                        <span class="notranslate"><i class="fas fa-clock"></i> ${res.time_spent_seconds}s</span>
                    </div>
                    <div style="font-weight: 500; margin-bottom: 10px;">${res.question}</div>
                    
                    <div class="ans-row">
                        <span class="ans-label" style="color: var(--text-muted)">Your Answer:</span>
                        <span style="color: ${res.is_correct ? 'var(--success)' : 'var(--error)'}; font-weight: bold;">
                            ${selectedDisplay} ${res.is_correct ? '<i class="fas fa-check"></i>' : '<i class="fas fa-times"></i>'}
                        </span>
                    </div>
                `;

                if(!res.is_correct) {
                    content += `
                    <div class="ans-row">
                        <span class="ans-label" style="color: var(--success)">Correct Answer:</span>
                        <span style="font-weight: bold;">${correctDisplay}</span>
                    </div>`;
                }
                card.innerHTML = content;
                reviewArea.appendChild(card);
            });
            
            // Natijalar paydo bo'lganda ham tarjimani bir yangilab yuboramiz
            setTimeout(refreshTranslation, 500);
        }

        function downloadJSON() {
            const finalData = {
                user_info: {
                    name: userData.name,
                    test_date: new Date().toLocaleString(),
                    total_questions: userData.count,
                    score_percentage: (userResponses.filter(r => r.is_correct).length / userData.count) * 100
                },
                detailed_results: userResponses
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(finalData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `Result_${userData.name.replace(/\s/g,'_')}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if(body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                icon.className = "fas fa-moon";
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = "fas fa-sun";
            }
        }
    </script>
</body>
</html>
